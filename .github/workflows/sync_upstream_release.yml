name: Sync Upstream And Release

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream-release
  cancel-in-progress: false

permissions:
  contents: write

env:
  AUTO_MINOR_PATCH_THRESHOLD: "10"
  AUTO_MINOR_COMMIT_PREFIX_REGEX: '^(feat|feature|minor|release-minor)(\(.+\))?:'
  AUTO_MINOR_UPSTREAM_TAG_REGEX: '^v[0-9]+\.[0-9]+\.0$'

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up upstream remote
        run: |
          git remote add upstream https://github.com/cwuom/NeriPlayer.git
          git fetch upstream master --tags

      - name: Check for upstream changes
        id: upstream
        run: |
          set -euo pipefail

          current_sha="$(git rev-parse HEAD)"
          upstream_sha="$(git rev-parse upstream/master)"

          echo "current_sha=${current_sha}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "${upstream_sha}" HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Merge upstream master
        if: steps.upstream.outputs.has_changes == 'true'
        run: |
          git merge --no-ff --no-edit -m "[skip ci] Sync upstream cwuom/NeriPlayer" upstream/master

      - name: Detect workflow file changes
        if: steps.upstream.outputs.has_changes == 'true'
        id: workflow_changes
        run: |
          set -euo pipefail

          if git diff --name-only HEAD~1 HEAD | grep -q '^\.github/workflows/'; then
            echo "has_workflow_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_workflow_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require workflow push token when workflow files changed
        if: steps.upstream.outputs.has_changes == 'true' && steps.workflow_changes.outputs.has_workflow_changes == 'true'
        env:
          SYNC_PUSH_TOKEN: ${{ secrets.SYNC_PUSH_TOKEN }}
        run: |
          if [ -z "${SYNC_PUSH_TOKEN}" ]; then
            echo "Upstream sync changed .github/workflows files, but SYNC_PUSH_TOKEN is not configured."
            echo "Please add a GitHub token with repo + workflow permissions as repository secret SYNC_PUSH_TOKEN."
            exit 1
          fi

      - name: Push merged master
        if: steps.upstream.outputs.has_changes == 'true'
        env:
          SYNC_PUSH_TOKEN: ${{ secrets.SYNC_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${SYNC_PUSH_TOKEN}" ]; then
            git remote set-url origin "https://x-access-token:${SYNC_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          git push origin HEAD:master

      - name: Set up JDK 17
        if: steps.upstream.outputs.has_changes == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Decode keystore
        if: steps.upstream.outputs.has_changes == 'true'
        run: |
          mkdir -p app
          echo "$KEYSTORE_B64" | base64 -d > app/neri.jks
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}

      - name: Grant execute permission
        if: steps.upstream.outputs.has_changes == 'true'
        run: chmod +x gradlew

      - name: Prepare auto release metadata
        if: steps.upstream.outputs.has_changes == 'true'
        id: meta
        run: |
          set -euo pipefail

          base_version="$(sed -n 's/.*RELEASE_VERSION_NAME = "\(.*\)".*/\1/p' build-logic/convention/src/main/kotlin/Common.kt | head -n 1)"
          if [ -z "${base_version}" ]; then
            echo "Failed to determine base version name from Common.kt"
            exit 1
          fi

          latest_release_tag="$(
            git for-each-ref \
              --sort=-version:refname \
              --format='%(refname:short)' \
              'refs/tags/v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true
          )"

          previous_tag="${latest_release_tag}"
          seed_version="${base_version}"
          if [ -n "${latest_release_tag}" ]; then
            seed_version="${latest_release_tag#v}"
          fi

          IFS='.' read -r major minor patch <<EOF
          ${seed_version}
          EOF

          if [ -z "${major:-}" ] || [ -z "${minor:-}" ] || [ -z "${patch:-}" ]; then
            echo "Failed to parse semantic version: ${seed_version}"
            exit 1
          fi

          bump_type="patch"
          bump_reason="default patch increment"
          range_start="${{ steps.upstream.outputs.current_sha }}"
          range_end="${{ steps.upstream.outputs.upstream_sha }}"

          if git log --format='%s' "${range_start}..${range_end}" | grep -Eiq "${AUTO_MINOR_COMMIT_PREFIX_REGEX}"; then
            bump_type="minor"
            bump_reason="matched upstream commit prefix rule"
          else
            upstream_tag_match="$(
              git tag --merged "${range_end}" \
                --sort=-version:refname \
                | grep -E "${AUTO_MINOR_UPSTREAM_TAG_REGEX}" \
                | head -n 1 || true
            )"

            if [ -n "${upstream_tag_match}" ]; then
              bump_type="minor"
              bump_reason="matched upstream tag rule (${upstream_tag_match})"
            else
              current_month="$(TZ=Asia/Shanghai date +'%Y-%m')"
              latest_sync_release_tag="$(
                git for-each-ref \
                  --sort=-creatordate \
                  --format='%(refname:short)' \
                  'refs/tags/v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true
              )"
              latest_sync_release_month=""
              if [ -n "${latest_sync_release_tag}" ]; then
                latest_sync_release_month="$(
                  git log -1 --date=format:'%Y-%m' --format='%ad' "${latest_sync_release_tag}" 2>/dev/null || true
                )"
              fi

              if [ "${latest_sync_release_month}" != "${current_month}" ]; then
                bump_type="minor"
                bump_reason="first auto sync release in current month (${current_month})"
              else
                threshold="${AUTO_MINOR_PATCH_THRESHOLD}"
                if [ "${patch}" -ge "${threshold}" ]; then
                  bump_type="minor"
                  bump_reason="patch threshold ${threshold} reached"
                fi
              fi
            fi
          fi

          if [ "${bump_type}" = "minor" ]; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          version_name="${major}.${minor}.${patch}"
          version_code=$((major * 10000 + minor * 100 + patch))
          tag_name="v${version_name}"
          target_sha="$(git rev-parse HEAD)"

          echo "base_version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "bump_type=${bump_type}" >> "$GITHUB_OUTPUT"
          echo "bump_reason=${bump_reason}" >> "$GITHUB_OUTPUT"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"
          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"

      - name: Build signed release APKs
        if: steps.upstream.outputs.has_changes == 'true'
        run: |
          ./gradlew clean assembleRelease \
            -PbuildAllReleaseAbis=true \
            -PbuildVersionName=${{ steps.meta.outputs.version_name }} \
            -PbuildVersionCode=${{ steps.meta.outputs.version_code }} \
            -PKEYSTORE_FILE=neri.jks \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=neriplayer \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }} \
            --warning-mode all --stacktrace

      - name: Generate release notes
        if: steps.upstream.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          TARGET_SHA: ${{ steps.meta.outputs.target_sha }}
          PREVIOUS_TAG: ${{ steps.meta.outputs.previous_tag }}
        run: |
          set -euo pipefail

          api_args=(
            --method POST
            "repos/${REPO}/releases/generate-notes"
            -f "tag_name=${TAG_NAME}"
            -f "target_commitish=${TARGET_SHA}"
          )

          if [ -n "${PREVIOUS_TAG}" ]; then
            api_args+=(-f "previous_tag_name=${PREVIOUS_TAG}")
          fi

          gh api "${api_args[@]}" --jq '.body' > release-notes.md

          {
            echo
            echo
            echo "## Auto Sync"
            echo "- Upstream repository: cwuom/NeriPlayer"
            echo "- Upstream commit: ${{ steps.upstream.outputs.upstream_sha }}"
            echo "- Bump type: ${{ steps.meta.outputs.bump_type }}"
            echo "- Bump reason: ${{ steps.meta.outputs.bump_reason }}"
            echo "- APK versionName: ${{ steps.meta.outputs.version_name }}"
            echo "- APK versionCode: ${{ steps.meta.outputs.version_code }}"
            echo
            echo "## Commits"
            if [ -n "${PREVIOUS_TAG}" ]; then
              git log --first-parent --pretty='- %h %s' "${PREVIOUS_TAG}..HEAD"
            else
              git log --first-parent --pretty='- %h %s'
            fi
          } >> release-notes.md

      - name: Create GitHub release
        if: steps.upstream.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          TARGET_SHA: ${{ steps.meta.outputs.target_sha }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          apk_files=(app/build/outputs/apk/release/*.apk)
          if [ "${#apk_files[@]}" -eq 0 ]; then
            echo "No release APKs were produced."
            exit 1
          fi

          gh release create "${TAG_NAME}" "${apk_files[@]}" \
            --repo "${REPO}" \
            --target "${TARGET_SHA}" \
            --title "Neri Player ${TAG_NAME}" \
            --notes-file release-notes.md \
            --latest

      - name: No upstream changes
        if: steps.upstream.outputs.has_changes != 'true'
        run: echo "No new commits in cwuom/NeriPlayer. Skipping merge and release."
